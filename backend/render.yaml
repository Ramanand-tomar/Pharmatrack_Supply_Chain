services:
  - type: web
    name: pharmatrack-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: IPFS_API_KEY
        sync: false
      - key: IPFS_API_SECRET
        sync: false
      - key: IPFS_JWT_SECRET
        sync: false
